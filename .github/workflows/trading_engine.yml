name: Trading Engine

# ── Triggered by cron-job.org at 09:14 IST via repository_dispatch ───────────
# workflow_dispatch is kept for manual runs / emergency fallback.
# The old schedule cron is removed — GH Actions cron lags 15–45 min.
on:
  repository_dispatch:
    types: [trading-session]
  workflow_dispatch:          # manual trigger / fallback

jobs:
  trading-session:
    runs-on: ubuntu-latest
    timeout-minutes: 390      # 6.5 h — covers 09:15–15:30 IST with buffer
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@noreply.github.com"

      - name: Run full trading session
        env:
          # ── Secrets ───────────────────────────────────────────────
          KITE_API_KEY:               ${{ secrets.KITE_API_KEY }}
          KITE_API_SECRET:            ${{ secrets.KITE_API_SECRET }}
          KITE_ACCESS_TOKEN:          ${{ secrets.KITE_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN:         ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:           ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_HOST:              ${{ secrets.DATABASE_HOST }}
          DATABASE_USERNAME:          ${{ secrets.DATABASE_USERNAME }}
          DATABASE_PASSWORD:          ${{ secrets.DATABASE_PASSWORD }}
          DATABASE_NAME:              ${{ secrets.DATABASE_NAME }}

          # ── Hardcoded config ──────────────────────────────────────
          PAPER_MODE:                 "True"
          ACTIVE_INDEX:               "NIFTY"
          ACTIVE_INDICES:             "NIFTY,BANKNIFTY,SENSEX"
          CANDLE_INTERVAL:            "15minute"
          CANDLE_MINUTES:             "15"
          MARKET_OPEN:                "09:15"
          TRADE_START:                "09:30"
          SIGNAL_START:               "10:00"
          TRADE_END:                  "15:00"
          MARKET_CLOSE:               "15:30"
          TRADING_CAPITAL:            "100000"
          RISK_PER_TRADE_PCT:         "0.05"
          STOP_LOSS_PCT:              "0.20"
          TARGET_PCT:                 "0.50"
          TARGET_PCT_NORMAL:          "0.50"
          TARGET_PCT_STRONG:          "0.60"
          TARGET_PCT_3_5:             "0.36"
          SL_PCT_3_5:                 "0.12"
          TRAILING_SL_PCT:            "0.50"
          MAX_CANDLES_HELD:           "4"
          TRAILING_TP_ENABLED:        "True"
          TRAILING_TP_C1:             "0.25"
          TRAILING_TP_C2:             "0.35"
          TRAILING_TP_C3:             "0.45"
          DAILY_LOSS_LIMIT_PCT:       "0.05"
          MAX_OPEN_POSITIONS:         "1"
          MIN_PREMIUM:                "30"
          MAX_PREMIUM:                "500"
          MIN_PROFIT_RATIO:           "3.0"
          MAX_PROFIT_RATIO:           "4.0"
          MIN_CONDITIONS:             "4"
          EMA_FAST_PERIOD:            "20"
          EMA_SLOW_PERIOD:            "50"
          RSI_PERIOD:                 "14"
          RSI_OVERSOLD:               "55"
          RSI_OVERBOUGHT:             "45"
          VOLUME_SPIKE_MULT:          "1.5"
          ADX_PERIOD:                 "14"
          ADX_THRESHOLD:              "20"
          NIFTY_ADX_THRESHOLD:        "25"
          BANKNIFTY_ADX_THRESHOLD:    "25"
          SENSEX_ADX_THRESHOLD:       "20"
          PDH_PROXIMITY_PCT:          "0.005"
          PDH_MIN_RANGE_PCT:          "0.005"
          FIB_PROXIMITY_PCT:          "0.15"
          FIB_MIN_SWING_PCT:          "0.50"
          VWAP_ZONE_PCT:              "0.15"
          MAX_DAILY_TRADES:           "1"
          MAX_DAILY_TRADES_OTM:       "2"
          PCR_MIN:                    "0.6"
          PCR_MAX:                    "1.5"
          PCR_BULL_MIN:               "1.1"
          PCR_BEAR_MAX:               "0.7"
          VIX_MAX:                    "20.0"
          STRONG_SIGNAL_THRESHOLD:    "5"
          OTM_STRIKES_AWAY:           "1"
          ENABLE_OPTION_SELLING:      "False"
          WEAK_SIGNAL_THRESHOLD:      "3"
          STRIKE_TYPE:                "ATM"
          PRODUCT_TYPE:               "MIS"
          NIFTY_LOT_SIZE:             "50"
          BANKNIFTY_LOT_SIZE:         "15"
          SENSEX_LOT_SIZE:            "10"
          NIFTY_STRIKE_STEP:          "50"
          BANKNIFTY_STRIKE_STEP:      "100"
          SENSEX_STRIKE_STEP:         "100"
          DATABASE_PORT:              "5432"
          ML_MIN_CONFIDENCE:          "0.30"
          ML_MODEL_PATH:              "ml/models/xgboost_model.pkl"
          LOG_LEVEL:                  "INFO"
          DASHBOARD_PORT:             "8501"
          DASHBOARD_REFRESH:          "5"
          OI_FETCH_INTERVAL:          "60"
          REPORTS_DIR:                "reports"
          BACKTEST_START:             "2023-01-01"
          BACKTEST_END:               "2026-04-30"
          BACKTEST_VIX:               "15.0"
          MAX_LOTS_CAP:               "3"
          LOT_SIZING_SL_PCT:          "0.12"
          REQUIRE_PREMIUM_DAY:        "True"
          ORB_ENABLED:                "True"
          ORB_MIN_RANGE_PCT:          "0.003"
          ORB_MAX_RANGE_PCT:          "0.020"
          ORB_BUFFER_PCT:             "0.001"
          ORB_TRADE_END:              "13:00"

        run: |
          while true; do
            echo "── Candle $(TZ='Asia/Kolkata' date '+%H:%M IST') ──────────────────────────"
            python3 main.py --candle

            # ── Commit state + logs after every candle ─────────────
            git pull --rebase origin main || true
            git add state.json logs/trade_log.csv logs/signal_log.csv \
                      ml/models/pattern_memory.json ml/models/xgboost_model.pkl || true
            git diff --staged --quiet || \
              git commit -m "candle: $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M IST')"
            git push || true

            # ── Exit after 15:15 IST (day summary already sent) ────
            IST_HHMM=$(TZ='Asia/Kolkata' date +%H%M)
            if [ "$IST_HHMM" -ge "1515" ]; then
              echo "Session complete at $(TZ='Asia/Kolkata' date '+%H:%M IST'). Exiting."
              break
            fi

            # ── Sleep until next 5-min boundary (position monitoring every 5 min) ──
            python3 -c 'import datetime,time,pytz; ist=pytz.timezone("Asia/Kolkata"); now=datetime.datetime.now(ist); m=now.minute%5; s=max((5-m)*60-now.second,30); print(f"Sleeping {s}s until next 5-min check."); time.sleep(s)'

          done
